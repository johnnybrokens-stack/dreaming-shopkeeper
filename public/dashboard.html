<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel — Dreaming Shopkeeper</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="/" class="logo"><div class="logo-icon">🏪</div>Dreaming<span>Shopkeeper</span></a>
      <div class="nav-links">
        <span id="user-credits" class="credits-badge"></span>
        <span id="user-name" class="user-display"></span>
        <button class="btn btn-outline btn-sm" onclick="manageSubscription()">Platby</button>
        <button class="btn btn-sm" onclick="logout()">Odhlásit</button>
      </div>
    </div>
  </nav>

  <div class="container dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-menu">
        <button class="sidebar-btn active" onclick="showTab('generate', this)"><span>⚡</span> Generovat</button>
        <button class="sidebar-btn" onclick="showTab('history', this)"><span>📁</span> Historie</button>
        <button class="sidebar-btn" onclick="showTab('settings', this)"><span>⚙️</span> Nastavení</button>
      </div>
      <div class="sidebar-tier">
        <p>Aktuální plán</p>
        <strong id="current-tier">Zdarma</strong>
        <a href="/pricing" class="upgrade-link" id="upgrade-link">Rozšířit plán →</a>
      </div>
    </aside>

    <main class="dashboard-main">
      <div id="tab-generate" class="tab-content active">
        <div class="generate-panel">
          <div class="panel-header">
            <h2>⚡ Generovat obsah</h2>
            <span class="panel-badge">AI Poháněno</span>
          </div>
          <div class="form-group">
            <label>Šablona</label>
            <select id="template-select" class="styled-select"></select>
          </div>
          <div class="form-group">
            <label>Název produktu / téma <span class="required">*</span></label>
            <input type="text" id="topic-input" placeholder="např. Bezdrátová sluchátka s ANC" maxlength="200">
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label>Cílová skupina (volitelné)</label>
              <input type="text" id="audience-input" placeholder="např. Mladí profesionálové 25-35 let">
            </div>
            <div class="form-group">
              <label>Klíčová slova (volitelné)</label>
              <input type="text" id="keywords-input" placeholder="např. Bluetooth, ANC, výdrž">
            </div>
          </div>
          <button class="btn btn-primary generate-btn" onclick="generateContent()" id="generate-btn">
            <span id="gen-btn-text"><span class="btn-icon">⚡</span><span class="btn-text">Generovat obsah</span></span>
            <span id="gen-btn-loading" style="display:none"><span class="spinner-small"></span> Generuji...</span>
          </button>

          <div id="loading-area" class="loading-area" style="display:none">
            <div class="spinner"></div>
            <p>Tvořím váš obsah...</p>
          </div>

          <div id="output-area" class="output-area" style="display:none">
            <div class="output-header">
              <h3>✨ Vygenerovaný obsah</h3>
              <div class="output-actions">
                <span id="word-count"></span>
                <button class="btn btn-sm btn-outline" onclick="copyOutput()">📋 Kopírovat</button>
              </div>
            </div>
            <div id="output-content" class="output-content"></div>
            <div class="social-share">
              <span class="share-label">Sdílet:</span>
              <button class="share-btn facebook" onclick="shareTo('facebook')" title="Sdílet na Facebook">📘 Facebook</button>
              <button class="share-btn linkedin" onclick="shareTo('linkedin')" title="Sdílet na LinkedIn">💼 LinkedIn</button>
              <button class="share-btn clipboard" onclick="copyOutput()" title="Kopírovat pro Instagram">📱 Instagram (kopie)</button>
            </div>
          </div>

          <div id="error-area" class="error-area" style="display:none"></div>
        </div>
      </div>

      <div id="tab-history" class="tab-content">
        <h2>📁 Historie obsahu</h2>
        <div id="history-list"></div>
        <div id="history-empty" class="empty-state" style="display:none">
          <div class="empty-icon">📝</div>
          <h3>Zatím žádný obsah</h3>
          <p>Vygenerujte svůj první text a objeví se zde.</p>
          <button class="btn btn-primary" onclick="showTab('generate', document.querySelector('.sidebar-btn'))">Generovat obsah</button>
        </div>
      </div>

      <div id="tab-settings" class="tab-content">
        <h2>⚙️ Nastavení účtu</h2>
        <div class="settings-card">
          <h3>Profil</h3>
          <div class="form-group"><label>Jméno</label><input type="text" id="settings-name" disabled></div>
          <div class="form-group"><label>E-mail</label><input type="email" id="settings-email" disabled></div>
          <div class="form-group"><label>Plán</label><input type="text" id="settings-tier" disabled></div>
          <div class="form-group"><label>Kredity</label><input type="text" id="settings-credits" disabled></div>
          <a href="/pricing" class="btn btn-primary">Změnit plán →</a>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script>
    async function loadDashboard() {
      const token = localStorage.getItem('cf_token');
      if (!token) { window.location.href = '/'; return; }
      try {
        const res = await fetch('/api/content/templates', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        populateTemplates(data.templates);
        loadHistory();
      } catch (err) { logout(); }
    }
    function populateTemplates(templates) {
      const select = document.getElementById('template-select');
      const list = document.getElementById('templates-list') || document.createElement('div');
      select.innerHTML = '<option value="">Vyberte šablonu...</option>';
      const cats = {};
      Object.entries(templates).forEach(([k, t]) => {
        const c = t.category || 'Ostatní';
        if (!cats[c]) cats[c] = [];
        cats[c].push({ key: k, ...t });
      });
      Object.entries(cats).forEach(([cat, items]) => {
        const og = document.createElement('optgroup');
        og.label = cat;
        items.forEach(i => { const o = document.createElement('option'); o.value = i.key; o.textContent = i.icon + ' ' + i.name; og.appendChild(o); });
        select.appendChild(og);
      });
    }
    async function generateContent() {
      const token = localStorage.getItem('cf_token');
      const template = document.getElementById('template-select').value;
      const topic = document.getElementById('topic-input').value;
      const audience = document.getElementById('audience-input').value;
      const keywords = document.getElementById('keywords-input').value;
      const btn = document.getElementById('generate-btn');
      const outputArea = document.getElementById('output-area');
      const errorArea = document.getElementById('error-area');
      const loadingArea = document.getElementById('loading-area');
      if (!template) { showError('Vyberte šablonu'); return; }
      if (!topic) { showError('Zadejte název produktu nebo téma'); return; }
      btn.disabled = true;
      document.getElementById('gen-btn-text').style.display = 'none';
      document.getElementById('gen-btn-loading').style.display = 'inline';
      outputArea.style.display = 'none';
      errorArea.style.display = 'none';
      loadingArea.style.display = 'block';
      try {
        const res = await fetch('/api/content/generate', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ template, topic, audience, keywords }) });
        const data = await res.json();
        if (res.status === 402) { window.location.href = '/pricing'; return; }
        if (!res.ok) throw new Error(data.error || 'Generování selhalo');
        document.getElementById('output-content').innerHTML = formatMarkdown(data.output);
        document.getElementById('word-count').textContent = data.wordCount + ' slov';
        outputArea.style.display = 'block';
        updateCredits(data.remainingCredits);
        loadHistory();
      } catch (err) { showError(err.message); }
      finally { btn.disabled = false; document.getElementById('gen-btn-text').style.display = 'inline'; document.getElementById('gen-btn-loading').style.display = 'none'; loadingArea.style.display = 'none'; }
    }
    async function loadHistory() {
      const token = localStorage.getItem('cf_token');
      try {
        const res = await fetch('/api/content/history', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        const list = document.getElementById('history-list');
        const empty = document.getElementById('history-empty');
        if (data.items.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        list.innerHTML = data.items.map(i => '<div class="history-item"><div><strong>' + i.template + '</strong><p>' + i.topic + '</p></div><div class="history-meta"><span>' + i.word_count + ' slov</span><span>' + new Date(i.created_at).toLocaleDateString('cs-CZ') + '</span></div></div>').join('');
      } catch (err) {}
    }
    function showTab(tab, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      if (btn) btn.classList.add('active');
    }
    function updateCredits(c) { document.getElementById('user-credits').textContent = c + ' kreditů'; }
    function copyOutput() {
      const text = document.getElementById('output-content').innerText;
      navigator.clipboard.writeText(text);
      const btn = event.target;
      btn.textContent = '✓ Zkopírováno!';
      setTimeout(() => btn.textContent = '📋 Kopírovat', 2000);
    }
    function shareTo(platform) {
      const text = document.getElementById('output-content').innerText;
      const url = window.location.href;
      if (platform === 'facebook') { window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url), '_blank', 'width=600,height=400'); }
      else if (platform === 'linkedin') { window.open('https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(url), '_blank', 'width=600,height=400'); }
      else { navigator.clipboard.writeText(text); alert('Text zkopírován pro Instagram!'); }
    }
    function formatMarkdown(text) { return text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/\n/g, '<br>'); }
    function showError(msg) { const e = document.getElementById('error-area'); e.textContent = msg; e.style.display = 'block'; }
    async function manageSubscription() {
      const token = localStorage.getItem('cf_token');
      try { const res = await fetch('/api/payment/portal', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token } }); const data = await res.json(); if (data.url) window.location.href = data.url; } catch (err) { alert('Nepodařilo se otevřít platební portál'); }
    }
    loadDashboard();
    const user = JSON.parse(localStorage.getItem('cf_user') || '{}');
    const sn = document.getElementById('settings-name');
    const se = document.getElementById('settings-email');
    const st = document.getElementById('settings-tier');
    const sc = document.getElementById('settings-credits');
    if (sn) sn.value = user.name || '';
    if (se) se.value = user.email || '';
    if (st) st.value = (user.tier || 'free').charAt(0).toUpperCase() + (user.tier || 'free').slice(1);
    if (sc) sc.value = (user.credits || 5) + ' kreditů';
  </script>
</body>
</html>
